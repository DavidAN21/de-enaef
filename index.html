<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI/CD Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --surface: #13141a;
      --border: #1f2130;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.12);
      --text: #e8eaf0;
      --muted: #6b7080;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 229, 160, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 24px 64px rgba(0,0,0,0.5);
      animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent-dim);
      border: 1px solid rgba(0, 229, 160, 0.25);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      margin-bottom: 1.75rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.1rem;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.7;
      margin-bottom: 2.25rem;
    }

    .pipeline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 2.5rem;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .step-icon {
      width: 36px;
      height: 36px;
      background: var(--accent-dim);
      border: 1px solid rgba(0, 229, 160, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .connector {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(0,229,160,0.3), rgba(0,229,160,0.1));
      margin: 0 6px;
      margin-bottom: 20px;
    }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.85rem 2.25rem;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 0 20px rgba(0, 229, 160, 0.25);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 32px rgba(0, 229, 160, 0.4);
      background: #1ffdb0;
    }

    button:active {
      transform: translateY(0);
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    footer span { color: var(--accent); }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">
      <span class="badge-dot"></span>
      Pipeline Active
    </div>

    <h1>CI/CD Demo</h1>

    <p class="description">
      A minimal static site built to demonstrate a GitHub Actions CI/CD pipeline —
      from code push to automated build, test, and deploy.
    </p>

    <div class="pipeline">
      <div class="step">
        <div class="step-icon">📝</div>
        <span>Push</span>
      </div>
      <div class="connector"></div>
      <div class="step">
        <div class="step-icon">⚙️</div>
        <span>Build</span>
      </div>
      <div class="connector"></div>
      <div class="step">
        <div class="step-icon">✅</div>
        <span>Test</span>
      </div>
      <div class="connector"></div>
      <div class="step">
        <div class="step-icon">🚀</div>
        <span>Deploy</span>
      </div>
    </div>

    <button onclick="alert('Hello from CI/CD pipeline!')">
      Trigger Pipeline Alert
    </button>
  </div>

  <footer>
    &copy; <span id="year"></span> &mdash; CI/CD Demo Project
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
